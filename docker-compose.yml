version: "3.8"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: magnet_platform
      POSTGRES_USER: magnet
      POSTGRES_PASSWORD: magnet_dev
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  commerce:
    build: ./commerce
    ports:
      - "9000:9000"
    environment:
      DATABASE_URL: postgres://magnet:magnet_dev@postgres:5432/magnet_platform
      STORE_CORS: http://localhost:3000
      PORT: "9000"
    depends_on:
      - postgres

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:9000
    depends_on:
      - commerce

volumes:
  pgdata:
